<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasklist</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <!-- INICIO - parte superior da pagina -->


    <!-- FINAL - parte superior da pagina -->

    <!--INICIO -  meio da pagina-->
    <main class="container d-flex flex-column">

        
        <!-- botoes de criacao e exclusao de tarefas -->
        <div class="d-flex gap-3 my-3">
            <button type="button" class="btn btn-primary"> <i class="bi bi-plus"></i> Nova Tarefa</button>
            <button type="button" class="btn btn-primary"><i class="bi bi-trash"></i> Excluir Tarefa</button>
        </div>

        <!--INICIO -  tabela de tarefas -->
        <table class="container table table-striped">
            <thead>
                <tr>
                    <th scope="col"></th>
                    <th scope="col">#</th>
                    <th scope="col">Dia</th>
                    <th scope="col">Hora</th>
                    <th scope="col">Descrição</th>
                    <th scope="col">Ações</th>
                </tr>
            </thead>
            <tbody>
                <!-- INICIO DE UMA TAREFA -->
                <tr>
                    <th scope="row"><input type="checkbox"></th>
                    <th scope="row">1</th>
                    <td>24/02/2026</td>
                    <td>13:00</td>
                    <td>Estudar Excel</td>
                    <td>

                        <button type="button" class="btn btn-primary">
                            <i class="bi bi-pencil"></i> 
                            Editar Tarefa
                        </button>

                    </td>
                </tr>
                <!-- FINAL DE UMA TAREFA -->

<!-- AS NOVAS TAREFAS DEVEM SER INCLUIDAS AQUI -->

            </tbody>
        </table>
        <!--FINAL -  tabela de tarefas -->


    </main>
    <!--FIM -  meio da pagina-->

    <!--INICIO -  rodapé -->
    <footer>
        <div class="row">
            <div class="col-12 bg-primary py-3">
                <h1 class="titulo text-center fs-5 "><i class="bi bi-cc-circle"></i> Todos o direitos reservados</h1>
            </div>
        </div>

    </footer>
    <!--FINAL -  rodapé -->

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
